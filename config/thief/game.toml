version = "1.00"

# Private, per-peer settings ONLY — never shared with, or read by, the cop
# process. See docs/tasks.md Chapter 2 ("Total Separation of Working
# Environments") and Appendix B (private vs. shared config files).

[game]
group_name = "TBD"
group_id = "TBD"

[network]
my_port = 8802
opponent_url = "http://127.0.0.1:8801/mcp"
turn_timeout_seconds = 30

# [strategy] -- optional: point at YOUR brain subclass (else the shipped
# ManhattanHeuristicBrain heuristic runs -- see docs/PLAN.md ADR-010).
# thief_class = "my_team.strategy:MyThiefBrain"

# [trash_talk] -- optional: HOW the verbal bluff/hint text is produced.
# The MOVE decision is always pure Python (Sec. 6.4.1) -- this only
# affects hint phrasing. "template" (default) costs zero tokens.
# provider = "template"

# [email] -- Gmail end-of-match reporting (Ch.9, Sec. 9.3.2-9.3.3).
# `recipient` is fixed by the rulebook's [agent's report address], never a
# per-team choice. Real sending requires a Google Cloud OAuth setup this
# session cannot perform (see docs/PRD_gmail_gatekeeper.md Sec.3) --
# left commented out until a team completes that manual setup themselves.
# recipient = "rmisegal+uoh26finalgame@gmail.com"
# mode = "real"  # or "dry_run" while OAuth credentials aren't set up yet
